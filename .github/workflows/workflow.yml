name: Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test (Node 24)
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint + unit tests
        run: npm test
      - name: Coverage
        run: npm run coverage
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
  test-e2e:
    runs-on: ubuntu-latest
    name: E2E
    # The e2e suite needs a kind cluster + localstack and is being re-greened
    # after the @kubernetes/client-node migration; non-blocking for now.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: versions
        run: |
          kind version
          kubectl version --client
          helm version
      - run: ./e2e/run-e2e-suite.sh
