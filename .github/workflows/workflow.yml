name: Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test (Node 24)
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint + unit tests
        run: npm test
      - name: Coverage
        run: npm run coverage
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Assert lockfile uses only the public npm registry
        run: |
          bad=$(grep -oE '"resolved": *"https?://[^/]+' package-lock.json | grep -v 'https://registry.npmjs.org' || true)
          if [ -n "$bad" ]; then
            echo "::error::package-lock.json references a non-public registry (expected only registry.npmjs.org):"
            echo "$bad"
            exit 1
          fi
          echo "OK: every resolved host in package-lock.json is registry.npmjs.org"
  test-e2e:
    runs-on: ubuntu-latest
    name: E2E
    steps:
      - uses: actions/checkout@v4
      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Install helm
        uses: azure/setup-helm@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: versions
        run: |
          kind version
          kubectl version --client
          helm version
      - name: Run e2e suite (kind + localstack)
        run: ./e2e/run-e2e-suite.sh
