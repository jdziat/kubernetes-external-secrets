name: docker

on:
  push:
    branches:
      - 'master'
    tags:
      - '*.*.*'
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image name
        id: image_name
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const res = await github.rest.repos.get(context.repo);
            let imageName = 'kes-dev';
            if (res.data.default_branch === context.ref.replace('refs/heads/', '') || context.ref.startsWith('refs/tags/')) {
              imageName = 'kubernetes-external-secrets';
            }
            core.setOutput('image', `ghcr.io/${context.repo.owner}/${imageName}`.toLowerCase());

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.image }}
          tags: |
            type=ref,event=tag
            type=ref,event=pr
            type=edge,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }},latest=false

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: env.GHCR_USERNAME != '' && steps.docker_meta.outputs.version != ''
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install cosign
        if: env.GHCR_USERNAME != '' && steps.docker_meta.outputs.version != ''
        uses: sigstore/cosign-installer@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ env.GHCR_USERNAME != '' && steps.docker_meta.outputs.version != '' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Sign image (keyless)
        if: env.GHCR_USERNAME != '' && steps.docker_meta.outputs.version != '' && steps.build.outputs.digest != ''
        env:
          IMAGE: ${{ steps.image_name.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
