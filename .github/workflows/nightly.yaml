name: nightly

on:
  schedule:
    - cron: '7 3 * * *'

permissions:
  contents: read
  packages: write

env:
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image_name.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image name
        id: image_name
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kubernetes-external-secrets" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.image }}
          tags: |
            type=schedule,pattern=nightly

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: env.GHCR_USERNAME != ''
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build nightly
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ env.GHCR_USERNAME != '' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          provenance: true
          sbom: true

  scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        # Only meaningful when the build job actually pushed an image (GHCR creds present);
        # skip on credential-less forks so the nightly does not fail pulling a missing tag.
        if: env.GHCR_USERNAME != ''
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build.outputs.image }}:nightly
          format: 'sarif'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        if: env.GHCR_USERNAME != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
